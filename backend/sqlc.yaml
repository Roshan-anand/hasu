version: "2"
sql:
  - engine: sqlite
    schema: "./sqlite/migrations"
    queries: "./sqlite/query"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        overrides:
          - column: "user.role"
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "UserRole"

          - column: "deployments.status"
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "DeploymentStatus"

          - column: "psql_service.type"
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "ServiceType"

          - column: "psql_service.status"
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "PredefinedServiceStatus"

          - column: "redis_service.type"
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "ServiceType"

          - column: "redis_service.status"
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "PredefinedServiceStatus"

          - column: "app_service.type"
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "ServiceType"
          - column: "app_service.git_provider"
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "GitProvider"

          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"

          - column: app_service.port
            go_type:
              type: "int32"

          - column: instance.git_source_type
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "GitSourceType"
            nullable: true

          - column: instance.status
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "InstanceStatus"

          - column: instance.created_by
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "CreatedBy"

          - column: orphan_volume.type
            go_type:
              import: "github.com/Roshan-anand/godploy/internal/lib/types"
              type: "PredefServiceType"
